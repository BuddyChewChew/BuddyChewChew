name: 🔄 Split Dashboard Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🛰️ Sync Live TV & FAST
        env:
          DISCORD_LIVE_WEBHOOK: ${{ secrets.DISCORD_LIVE_WEBHOOK }}
          DISCORD_FAST_WEBHOOK: ${{ secrets.DISCORD_FAST_WEBHOOK }}
        run: |
          python scripts/update_live.py
          python scripts/update_fast.py

      - name: 💾 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "📡 Split Dashboard Update: $(date -u)"
            git push origin main
          fi
