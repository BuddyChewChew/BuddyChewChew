name: 🔄 Update Profile Dashboard

on:
  schedule:
    - cron: '0 * * * *'  # Runs at the start of every hour
  workflow_dispatch:     # Allows you to click "Run workflow" manually

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so rebase works correctly

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🛰️ Run Dashboard Sync
        run: python scripts/update_readme.py

      - name: 💾 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          
          git add README.md
          
          # Only proceed if there are actual changes to the README
          if ! git diff --cached --quiet; then
            git commit -m "📡 Dashboard Update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            
            # Pull latest changes and rebase to avoid push conflicts
            git pull --rebase origin main
            git push origin main
          else
            echo "✅ No changes detected in stream status."
          fi
