name: 🔄 Update Profile Dashboard

on:
  schedule:
    - cron: '0 * * * *'  # Runs at the start of every hour
  workflow_dispatch:     # Allows manual trigger for testing

permissions:
  contents: write        # Required to push changes back to the README

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: pip install requests

      - name: 🛰️ Run Dashboard Sync
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python scripts/update_readme.py

      - name: 💾 Commit & Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          
          git add README.md
          
          # Only commit if the README actually changed
          if ! git diff --cached --quiet; then
            git commit -m "📡 Dashboard Update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git pull --rebase origin main
            git push origin main
          else
            echo "✅ No status changes detected; README is already up to date."
          fi
