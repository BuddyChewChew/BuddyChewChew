name: 🏆 Daily Sports Guide

on:
  schedule:
    - cron: '0 13 * * *'  # Runs daily at 9:00 AM EST
  workflow_dispatch:      # Manual trigger

permissions:
  contents: read

jobs:
  post_guide:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🏟️ Run Sports Guide Script
        env:
          DISCORD_SPORTS_WEBHOOK: ${{ secrets.DISCORD_SPORTS_WEBHOOK }}
          DISCORD_SPORTS_MESSAGE_ID: ${{ secrets.DISCORD_SPORTS_MESSAGE_ID }}
        run: python scripts/sport_guide.py
