name: 🏆 Daily Sports Guide

on:
  schedule:
    - cron: '0 13 * * *'  # Runs every day at 8:00 AM EST
  workflow_dispatch:      # Allows you to trigger it manually from the Actions tab

permissions:
  contents: read

jobs:
  post_guide:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🏟️ Run Sports Guide Script
        env:
          DISCORD_SPORTS_WEBHOOK: ${{ secrets.DISCORD_SPORTS_WEBHOOK }}
        run: python scripts/sport_guide.py
