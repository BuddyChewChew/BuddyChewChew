name: 🏆 Daily Sports Guide

on:
  schedule:
    - cron: '30 12 * * *'  # Runs once a day (7:30 AM EST)
  workflow_dispatch:       # Allows you to click "Run workflow" manually

jobs:
  post_guide:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🏟️ Run Sports Guide Script
        env:
          # Reusing your existing secret is fine!
          DISCORD_LIVE_WEBHOOK: ${{ secrets.DISCORD_LIVE_WEBHOOK }}
        run: python scripts/sport_guide.py
